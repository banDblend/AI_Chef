<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chef</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <!-- Marked.js for markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>👨‍🍳 AI Chef</h1>
            <p>Tell me what you have, and I'll tell you what to make.</p>
        </header>

        <main>
            <div class="input-section glass-panel">
                <label for="ingredients">What ingredients do you have?</label>
                <textarea id="ingredients" placeholder="e.g. Chicken, rice, broccoli, garlic..." rows="3"></textarea>
                <button id="generateBtn">Generate Recipe</button>
            </div>

            <div id="loading" class="hidden">
                <div class="spinner"></div>
                <p>The Chef is thinking...</p>
            </div>

            <div id="recipeContainer" class="hidden glass-panel">
                <div id="recipeContent"></div>
            </div>
            
            <div id="errorContainer" class="hidden error-panel">
                <p id="errorContent"></p>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
